<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML List Tag</title>
</head>
<body>
    <ol>
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
    </ol>
    <ol start="6">
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
    </ol>
    <ol type="A">
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
        
    </ol>
    <ol type="a" start="27">
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
    </ol>
    <ol type="I">
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
    </ol>
    <ul type="disc">
        <li>Bag</li>
        <li>Book</li>
        <li>Pen</li>
        <li>Pencil</li>
    </ul>
</body>
</html>
